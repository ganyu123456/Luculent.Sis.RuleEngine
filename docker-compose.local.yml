# ===== SIS RuleEngine 本地开发部署 =====
# 使用现有 sis-redis + sis-clickhouse + 本地构建镜像
#
# 启动命令:
#   docker compose -f docker-compose.yml -f docker-compose.local.yml up -d

services:
  # 不启动 redis / clickhouse（使用外部 sis-* 容器）
  redis:
    profiles:
      - disabled

  clickhouse:
    profiles:
      - disabled

  master:
    image: ruleengine-master:local
    build: !reset
    depends_on: !reset {}
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://0.0.0.0:11081
      - Redis__ConnectionString=sis-redis:6379
      - ClickHouse__ConnectionString=Host=sis-clickhouse;Port=8123;Database=ruleengine
    ports:
      - "11081:11081"
    networks:
      - ruleengine
      - sis_net

  worker:
    profiles:
      - disabled

networks:
  sis_net:
    name: 00-liems_aicode_default
    external: true
