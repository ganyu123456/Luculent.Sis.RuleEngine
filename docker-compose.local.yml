# ===== SIS RuleEngine 本地开发部署 =====
# 使用现有 sis-redis + sis-clickhouse + 本地构建镜像
#
# 启动命令:
#   docker compose -f docker-compose.yml -f docker-compose.local.yml up -d
#   扩展 Worker: docker compose -f docker-compose.yml -f docker-compose.local.yml up -d --scale worker=2

services:
  # 不启动 redis / clickhouse（使用外部 sis-* 容器）
  redis:
    profiles:
      - disabled

  clickhouse:
    profiles:
      - disabled

  master:
    image: harbor.zkjgy.online/library/ruleengine-master:latest
    build: !reset {}
    depends_on: !reset {}
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://0.0.0.0:11081
      - REDIS_CONNECTION=sis-redis:6379
      - CLICKHOUSE_CONNECTION=Host=sis-clickhouse;Port=8123;Database=ruleengine
    ports:
      - "11081:11081"
    networks:
      - ruleengine
      - sis_net

  worker:
    image: harbor.zkjgy.online/library/ruleengine-worker:latest
    build: !reset
      context: .
      dockerfile: src/Luculent.Sis.RuleEngine.Worker/Dockerfile
    environment:
      - DOTNET_ENVIRONMENT=Production
      - MASTER_API_URL=http://master:11081
      - REDIS_CONNECTION=sis-redis:6379
      - CLICKHOUSE_CONNECTION=Host=sis-clickhouse;Port=8123;Database=ruleengine
    depends_on: !reset
      master:
        condition: service_healthy
    networks:
      - ruleengine
      - sis_net
    restart: unless-stopped
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "2"
          memory: "2G"

networks:
  sis_net:
    name: 00-liems_aicode_default
    external: true
