# ===== SIS RuleEngine 本地开发部署 =====
# 使用现有 sis-redis + sis-clickhouse，仅启动 Master + Worker
#
# 启动命令:
#   docker compose -f docker-compose.yml -f docker-compose.local.yml up -d
#   横向扩展: docker compose -f docker-compose.yml -f docker-compose.local.yml up -d --scale worker=5

services:
  # 覆盖：不启动 redis（使用外部 sis-redis）
  redis:
    profiles:
      - disabled

  # 覆盖：不启动 clickhouse（使用外部 sis-clickhouse）
  clickhouse:
    profiles:
      - disabled

  master:
    environment:
      - Redis__ConnectionString=sis-redis:6379,password=${REDIS_PASSWORD:-}
      - ClickHouse__ConnectionString=Host=sis-clickhouse;Port=8123;Database=ruleengine;User=ruleengine;Password=${CLICKHOUSE_PASSWORD:-RuleEngine2026!}
    networks:
      - ruleengine
      - sis_net

  worker:
    environment:
      - Redis__ConnectionString=sis-redis:6379,password=${REDIS_PASSWORD:-}
      - ClickHouse__ConnectionString=Host=sis-clickhouse;Port=8123;Database=ruleengine;User=ruleengine;Password=${CLICKHOUSE_PASSWORD:-RuleEngine2026!}
    networks:
      - ruleengine
      - sis_net

networks:
  sis_net:
    name: 00-liems_aicode_default
    external: true
