<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIS RuleEngine - Dashboard</title>
<style>
:root{--bg:#f0f2f5;--card:#fff;--primary:#1677ff;--success:#52c41a;--warning:#faad14;--danger:#ff4d4f;--text:#1f1f1f;--text2:#666;--border:#e8e8e8}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);line-height:1.5}
.header{background:var(--primary);color:#fff;padding:16px 24px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}
.header h1{font-size:20px;font-weight:600;white-space:nowrap}
.header-right{display:flex;align-items:center;gap:16px;flex-shrink:0}
.header .time{font-size:13px;opacity:.85;white-space:nowrap}
.header .btn{display:inline-flex;align-items:center;gap:4px;padding:6px 14px;border:1.5px solid rgba(255,255,255,.5);border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;background:rgba(255,255,255,.15);color:#fff;transition:background .2s}
.header .btn:hover{background:rgba(255,255,255,.25)}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;padding:24px}
.card{background:var(--card);border-radius:8px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.card .label{font-size:13px;color:var(--text2);margin-bottom:8px}
.card .value{font-size:32px;font-weight:700}
.card .value.green{color:var(--success)}
.card .value.red{color:var(--danger)}
.card .value.blue{color:var(--primary)}
.card .value.orange{color:var(--warning)}
.section{padding:0 24px 24px}
.section h2{font-size:16px;margin-bottom:12px;color:var(--text)}
table{width:100%;border-collapse:collapse;background:var(--card);border-radius:8px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.08)}
th,td{padding:10px 16px;text-align:left;font-size:13px}
th{background:#fafafa;font-weight:600;border-bottom:2px solid var(--border)}
td{border-bottom:1px solid var(--border)}
tr:hover{background:#f5f5f5}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:12px;font-weight:500}
.badge.error{background:#fff1f0;color:var(--danger);border:1px solid #ffa39e}
.badge.online{background:#f6ffed;color:var(--success);border:1px solid #b7eb8f}
.badge.offline{background:#fff2e8;color:#d46b08;border:1px solid #ffd591}
.worker-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.worker-card{background:var(--card);border-radius:8px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.08);border-left:4px solid var(--primary)}
.worker-card .worker-title{font-size:15px;font-weight:600;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.worker-card .worker-stats{display:flex;gap:24px}
.worker-card .stat{text-align:center}
.worker-card .stat .num{font-size:24px;font-weight:700}
.worker-card .stat .lbl{font-size:12px;color:var(--text2);margin-top:2px}
.worker-card .heartbeat{font-size:11px;color:var(--text2);margin-top:12px}
.refresh-info{font-size:12px;color:var(--text2);padding:0 24px 4px;text-align:right}
@media print{
  body{background:#fff}
  .header{background:#fff!important;color:#000!important;border-bottom:2px solid #000}
  .header .btn{display:none!important}
  .card{box-shadow:none;border:1px solid #ddd}
  .worker-card{border-left:2px solid #000!important}
}
</style>
</head>
<body>
<div class="header">
  <h1>SIS RuleEngine Dashboard</h1>
  <div class="header-right">
    <span class="time" id="clock"></span>
    <button class="btn" onclick="refresh()">刷新</button>
    <button class="btn" onclick="window.print()">导出 PDF</button>
  </div>
</div>

<div class="refresh-info" id="refreshInfo"></div>

<div class="grid">
  <div class="card">
    <div class="label">监视项总数</div>
    <div class="value blue" id="totalMonitors">-</div>
  </div>
  <div class="card">
    <div class="label">活跃报警数</div>
    <div class="value red" id="activeAlarms">-</div>
  </div>
  <div class="card">
    <div class="label">活跃 Worker 数</div>
    <div class="value green" id="activeWorkers">-</div>
  </div>
  <div class="card">
    <div class="label">数据更新时间</div>
    <div class="value" style="font-size:16px" id="updateTime">-</div>
  </div>
</div>

<div class="section" id="workerSection">
  <h2>Worker 节点</h2>
  <div class="worker-grid" id="workerGrid"></div>
</div>

<div class="section">
  <h2>活跃报警 Top 20</h2>
  <table>
    <thead>
      <tr><th>监视项 ID</th><th>名称</th><th>状态</th><th>触发值</th><th>发生时间</th><th>Worker</th></tr>
    </thead>
    <tbody id="alarmTable"></tbody>
  </table>
</div>

<script>
const API = '/api/ruleengine/dashboard/data';
let data = null;

function fmtTime(t){return t?new Date(t).toLocaleString('zh-CN'):'-'}
function fmtShort(t){return t?new Date(t).toLocaleTimeString('zh-CN'):'-'}
function fmtVal(v){return typeof v==='number'?v.toFixed(2):v}
function updateClock(){document.getElementById('clock').textContent=new Date().toLocaleString('zh-CN')}

async function refresh(){
  try{
    const r=await fetch(API);data=await r.json();
    document.getElementById('totalMonitors').textContent=data.totalMonitors.toLocaleString();
    document.getElementById('activeAlarms').textContent=data.activeAlarmCount.toLocaleString();
    document.getElementById('activeWorkers').textContent=data.activeWorkers;
    document.getElementById('updateTime').textContent=fmtTime(data.timestamp);
    document.getElementById('refreshInfo').textContent='上次刷新: '+new Date().toLocaleTimeString('zh-CN');

    // Worker 卡片
    const workers=data.workers||[];
    const wg=document.getElementById('workerGrid');
    if(workers.length===0){
      wg.innerHTML='<div style="color:#999">无注册 Worker，使用嵌入式计算</div>';
    }else{
      wg.innerHTML=workers.map(w=>{
        const cls=w.status==='Online'?'online':'offline';
        return `<div class="worker-card">
          <div class="worker-title">
            <span>${w.workerId}</span>
            <span class="badge ${cls}">${w.status}</span>
          </div>
          <div class="worker-stats">
            <div class="stat"><div class="num blue">${w.monitorCount.toLocaleString()}</div><div class="lbl">运行监视项</div></div>
            <div class="stat"><div class="num ${w.alarmCount>0?'red':'green'}">${w.alarmCount.toLocaleString()}</div><div class="lbl">活跃报警</div></div>
          </div>
          <div class="heartbeat">最后心跳: ${fmtTime(w.lastHeartbeat)}</div>
        </div>`;
      }).join('');
    }

    // 报警表格
    const tb=document.getElementById('alarmTable');
    const items=data.topAlarmMonitors||[];
    if(items.length===0){
      tb.innerHTML='<tr><td colspan="6" style="text-align:center;color:#999">无活跃报警</td></tr>';
    }else{
      tb.innerHTML=items.map(a=>
        `<tr><td>${a.monitorId}</td><td>${a.monitorName||'-'}</td><td><span class="badge error">${a.statusKey}</span></td><td>${fmtVal(a.value)}</td><td>${fmtTime(a.occurTime)}</td><td>${a.workerId}</td></tr>`
      ).join('');
    }
  }catch(e){
    document.getElementById('refreshInfo').textContent='加载失败: '+e.message;
  }
}

setInterval(updateClock,1000);
updateClock();
refresh();
setInterval(refresh,10000);
</script>
</body>
</html>
