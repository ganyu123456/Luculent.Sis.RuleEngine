<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIS RuleEngine - Dashboard</title>
<style>
:root{--bg:#f0f2f5;--card:#fff;--primary:#1677ff;--success:#52c41a;--warning:#faad14;--danger:#ff4d4f;--text:#1f1f1f;--text2:#666;--border:#e8e8e8}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);line-height:1.5}
.header{background:var(--primary);color:#fff;padding:16px 24px;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:20px;font-weight:600}
.header .time{font-size:13px;opacity:.85}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;padding:24px}
.card{background:var(--card);border-radius:8px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.card .label{font-size:13px;color:var(--text2);margin-bottom:8px}
.card .value{font-size:32px;font-weight:700}
.card .value.green{color:var(--success)}
.card .value.red{color:var(--danger)}
.card .value.blue{color:var(--primary)}
.section{padding:0 24px 24px}
.section h2{font-size:16px;margin-bottom:12px;color:var(--text)}
table{width:100%;border-collapse:collapse;background:var(--card);border-radius:8px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.08)}
th,td{padding:10px 16px;text-align:left;font-size:13px}
th{background:#fafafa;font-weight:600;border-bottom:2px solid var(--border)}
td{border-bottom:1px solid var(--border)}
tr:hover{background:#f5f5f5}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:12px;font-weight:500}
.badge.error{background:#fff1f0;color:var(--danger);border:1px solid #ffa39e}
.badge.info{background:#e6f4ff;color:var(--primary);border:1px solid #91caff}
.btn{display:inline-block;padding:8px 16px;border:none;border-radius:6px;cursor:pointer;font-size:14px;font-weight:500;text-decoration:none}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:#4096ff}
.toolbar{display:flex;gap:12px;align-items:center;padding:0 24px 16px}
.refresh-indicator{font-size:12px;color:var(--text2)}
.chart-bar{display:flex;align-items:center;gap:8px;margin:4px 0}
.chart-bar .bar-label{width:180px;font-size:12px;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chart-bar .bar-track{flex:1;height:20px;background:#f0f0f0;border-radius:4px;overflow:hidden}
.chart-bar .bar-fill{height:100%;background:var(--primary);border-radius:4px;transition:width .3s}
.chart-bar .bar-count{font-size:12px;color:var(--text2);min-width:40px}
@media print{
  body{background:#fff}
  .header{background:#fff!important;color:#000!important;border-bottom:2px solid #000}
  .btn,.toolbar{display:none!important}
  .card{box-shadow:none;border:1px solid #ddd}
}
</style>
</head>
<body>
<div class="header">
  <h1>SIS RuleEngine Dashboard</h1>
  <span class="time" id="clock"></span>
</div>

<div class="toolbar">
  <button class="btn btn-primary" onclick="refresh()">刷新数据</button>
  <button class="btn btn-primary" onclick="window.print()">导出 PDF</button>
  <span class="refresh-indicator" id="refreshInfo"></span>
</div>

<div class="grid">
  <div class="card">
    <div class="label">监视项总数</div>
    <div class="value blue" id="totalMonitors">-</div>
  </div>
  <div class="card">
    <div class="label">活跃报警数</div>
    <div class="value red" id="activeAlarms">-</div>
  </div>
  <div class="card">
    <div class="label">活跃 Worker 数</div>
    <div class="value green" id="activeWorkers">-</div>
  </div>
  <div class="card">
    <div class="label">数据更新时间</div>
    <div class="value" style="font-size:16px" id="updateTime">-</div>
  </div>
</div>

<div class="section" id="statusChart" style="display:none">
  <h2>报警状态分布</h2>
  <div id="statusBars"></div>
</div>

<div class="section">
  <h2>活跃报警 Top 20</h2>
  <table>
    <thead>
      <tr><th>监视项 ID</th><th>名称</th><th>状态</th><th>触发值</th><th>发生时间</th><th>Worker</th></tr>
    </thead>
    <tbody id="alarmTable"></tbody>
  </table>
</div>

<script>
const API = '/api/ruleengine/dashboard/data';
let data = null;

function fmtTime(t){return t?new Date(t).toLocaleString('zh-CN'):'-'}
function fmtVal(v){return typeof v==='number'?v.toFixed(2):v}
function updateClock(){document.getElementById('clock').textContent=new Date().toLocaleString('zh-CN')}

async function refresh(){
  try{
    const r=await fetch(API);data=await r.json();
    document.getElementById('totalMonitors').textContent=data.totalMonitors.toLocaleString();
    document.getElementById('activeAlarms').textContent=data.activeAlarmCount.toLocaleString();
    document.getElementById('activeWorkers').textContent=data.activeWorkers;
    document.getElementById('updateTime').textContent=fmtTime(data.timestamp);
    document.getElementById('refreshInfo').textContent='上次刷新: '+new Date().toLocaleTimeString('zh-CN');

    const bars=document.getElementById('statusBars');
    const chart=document.getElementById('statusChart');
    const entries=Object.entries(data.alarmsByStatus||{});
    if(entries.length>0){
      chart.style.display='block';
      const max=Math.max(...entries.map(e=>e[1]),1);
      bars.innerHTML=entries.map(([k,v])=>
        `<div class="chart-bar"><span class="bar-label" title="${k}">${k}</span><div class="bar-track"><div class="bar-fill" style="width:${(v/max*100).toFixed(0)}%"></div></div><span class="bar-count">${v}</span></div>`
      ).join('');
    }else{chart.style.display='none'}

    const tb=document.getElementById('alarmTable');
    const items=data.topAlarmMonitors||[];
    if(items.length===0){
      tb.innerHTML='<tr><td colspan="6" style="text-align:center;color:#999">无活跃报警</td></tr>';
    }else{
      tb.innerHTML=items.map(a=>
        `<tr><td>${a.monitorId}</td><td>${a.monitorName||'-'}</td><td><span class="badge error">${a.statusKey}</span></td><td>${fmtVal(a.value)}</td><td>${fmtTime(a.occurTime)}</td><td>${a.workerId}</td></tr>`
      ).join('');
    }
  }catch(e){
    document.getElementById('refreshInfo').textContent='加载失败: '+e.message;
  }
}

setInterval(updateClock,1000);
updateClock();
refresh();
setInterval(refresh,10000);
</script>
</body>
</html>
