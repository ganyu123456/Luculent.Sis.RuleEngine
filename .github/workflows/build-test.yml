name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

env:
  DOTNET_VERSION: 10.0.x

jobs:
  # ── .NET Build & Test ────────────────────────────────────
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build --verbosity normal

  # ── Multi-arch Docker Build & Push (仅 tag) ─────────────
  docker-release:
    name: Docker Multi-Arch Release
    runs-on: ubuntu-latest
    needs: build-test
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      packages: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: ruleengine-master
            dockerfile: src/Luculent.Sis.RuleEngine.Master/Dockerfile
          - name: ruleengine-worker
            dockerfile: src/Luculent.Sis.RuleEngine.Worker/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          V="${GITHUB_REF#refs/tags/v}"
          echo "version=$V" >> $GITHUB_OUTPUT

      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Harbor Registry
        uses: docker/login-action@v3
        with:
          registry: harbor.zkjgy.online
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build and push ${{ matrix.image.name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            harbor.zkjgy.online/library/${{ matrix.image.name }}:${{ steps.version.outputs.version }}
            harbor.zkjgy.online/library/${{ matrix.image.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── GitHub Release ───────────────────────────────────────
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: docker-release
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          V="${GITHUB_REF#refs/tags/v}"
          echo "version=$V" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          body: |
            ## Docker Images (Multi-Arch: amd64 + arm64)

            | Image | Pull Command |
            |-------|-------------|
            | Master | `docker pull harbor.zkjgy.online/library/ruleengine-master:${{ steps.version.outputs.version }}` |
            | Worker | `docker pull harbor.zkjgy.online/library/ruleengine-worker:${{ steps.version.outputs.version }}` |

            ### 客户交付命令
            ```bash
            docker pull harbor.zkjgy.online/library/ruleengine-master:${{ steps.version.outputs.version }}
            docker pull harbor.zkjgy.online/library/ruleengine-worker:${{ steps.version.outputs.version }}
            ```
